name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build common module
        run: ./mvnw -B -pl {{APP_NAME}}-common install

      - name: Build API
        run: ./mvnw -B -pl {{APP_NAME}}-api package -Pteavm
{{#FRONTEND}}

      - name: Build frontend
        run: ./mvnw -B -pl {{APP_NAME}}-frontend package
{{/FRONTEND}}
{{PROCESSOR_MODULES_CI}}
