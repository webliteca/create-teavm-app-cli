<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base-url" content="${API_BASE_URL}">
{{#AUTH}}
    <meta name="firebase-api-key" content="${FIREBASE_API_KEY}">
    <meta name="firebase-auth-domain" content="${FIREBASE_AUTH_DOMAIN}">
    <meta name="firebase-project-id" content="${FIREBASE_PROJECT_ID}">
    <meta name="firebase-storage-bucket" content="${FIREBASE_STORAGE_BUCKET}">
    <meta name="firebase-messaging-sender-id" content="${FIREBASE_MESSAGING_SENDER_ID}">
    <meta name="firebase-app-id" content="${FIREBASE_APP_ID}">
{{/AUTH}}
    <title>{{APP_NAME_CAMEL}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .app { min-height: 100vh; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #1a1a2e; color: white; }
        .app-title { font-size: 1.5rem; }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-btn { padding: 0.5rem 1rem; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white; border-radius: 4px; cursor: pointer; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .content { padding: 2rem; max-width: 800px; margin: 0 auto; }
        .page h1 { margin-bottom: 1rem; }
        .page p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="js/app.js"></script>
    <script>if (typeof main === 'function') main([]);</script>
</body>
</html>
